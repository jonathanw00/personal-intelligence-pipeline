# Vault
obsidian_vault_path: "/volume1/homes/Jon/Obsidian/Obsidian/My Main Vault"
resources_path: "Resources"
books_path: "Books"
digest_path: "Weekly Digest"

# Claude API
claude_model: "claude-haiku-4-5-20251001"
claude_max_tokens: 4096
tags_max: 6
tags_min: 4

# Kindle highlight filter
highlight_min_words: 20

# Daily note
daily_note_append: true
daily_note_path: "Journal/2020's"
daily_note_emoji: "📚"

# Weekly digest
digest_day: "sunday"
digest_hour: 6
digest_telegram_format: "teaser"   # options: teaser | full

# Logging
log_max_bytes: 5242880   # 5MB

# Bot input detection
min_paste_words: 100              # messages above this word count treated as pasted text

# Note body
full_text_threshold_words: 3000   # above this, use context windows instead of full text
context_window_words: 200         # words of context captured around each quoted passage

# Flags
dry_run: false
